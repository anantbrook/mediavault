version: '3.8'

services:
  app:
    build: .
    ports:
      - "5050:5050"
    volumes:
      - ./downloads:/app/downloads
    environment:
      - DOCKER_ENV=1
      # Set your Telegram config here if you want to use it
      # - TELEGRAM_BOT_TOKEN=...
      # - TELEGRAM_CHAT_ID=...

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  sqlite:
    image: nouchka/sqlite3
    volumes:
      - ./data:/data
    command: sqlite3 /data/mydb.db
    ports:
      - '8080:8080'
