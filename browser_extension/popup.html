<!DOCTYPE html>
<html>
<head>
    <title>MediaVault</title>
    <style>
        body { font-family: sans-serif; padding: 10px; width: 250px; }
        input { width: 100%; padding: 5px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; background: #28a745; color: white; border: none; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <h3>MediaVault Extension</h3>
    <label>Server URL:</label>
    <input type="text" id="urlInput" placeholder="http://localhost:5050" />
    <button id="saveBtn">Save Settings</button>
    <div id="status" style="margin-top: 10px; color: green; font-size: 12px;"></div>
    
    <script src="popup.js"></script>
</body>
</html>
